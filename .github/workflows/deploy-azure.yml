name: Build & Deploy to Azure (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: rideghana
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Set Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "ASPNETCORE_ENVIRONMENT",       "value": "Production",  "slotSetting": false },
              { "name": "ASPNETCORE_URLS",               "value": "http://+:8080", "slotSetting": false },
              { "name": "Stripe__SecretKey",             "value": "${{ secrets.STRIPE_SECRET_KEY }}", "slotSetting": false },
              { "name": "Stripe__PublishableKey",        "value": "${{ secrets.STRIPE_PUBLISHABLE_KEY }}", "slotSetting": false },
              { "name": "Stripe__WebhookSecret",         "value": "${{ secrets.STRIPE_WEBHOOK_SECRET }}", "slotSetting": false },
              { "name": "Email__SmtpHost",               "value": "smtp.sendgrid.net", "slotSetting": false },
              { "name": "Email__SmtpPort",               "value": "587", "slotSetting": false },
              { "name": "Email__SmtpUser",               "value": "apikey", "slotSetting": false },
              { "name": "Email__SmtpPass",               "value": "${{ secrets.SENDGRID_API_KEY }}", "slotSetting": false },
              { "name": "Email__FromAddress",            "value": "no-reply@rideghana.com", "slotSetting": false },
              { "name": "Email__FromName",               "value": "Ride Ghana", "slotSetting": false },
              { "name": "Email__NotificationAddress",    "value": "b.anogoya@placeholderemail.com", "slotSetting": false }
            ]
